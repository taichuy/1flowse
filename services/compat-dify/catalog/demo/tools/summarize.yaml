identity:
  name: summarize
  author: demo
  label:
    en_US: Demo Summarize
  description:
    en_US: Summarize uploaded content.
  icon: summarize.svg
parameters:
  - name: content_uri
    type: file
    required: true
    label:
      en_US: Content URI
    human_description:
      en_US: File URI to summarize
    form: form
  - name: style
    type: select
    required: false
    label:
      en_US: Style
    human_description:
      en_US: Summary style
    options:
      - value: brief
        label:
          en_US: Brief
      - value: detailed
        label:
          en_US: Detailed
    default: brief
    form: llm
